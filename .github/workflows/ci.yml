name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test --coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(bun test --coverage 2>&1 | grep -E "^src/" | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); if ($3+0 < 85) print $1, $3}' | head -20)
          if [ -n "$COVERAGE" ]; then
            echo "Files below 85% line coverage:"
            echo "$COVERAGE"
            exit 1
          fi
          echo "All files above 85% line coverage"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
