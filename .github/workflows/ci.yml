name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test --coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(bun test --coverage 2>&1 | grep -E "^src/" | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); if ($3+0 < 85) print $1, $3}' | head -20)
          if [ -n "$COVERAGE" ]; then
            echo "Files below 85% line coverage:"
            echo "$COVERAGE"
            exit 1
          fi
          echo "All files above 85% line coverage"

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun run test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chac:ci .

      - name: Smoke test
        run: |
          docker run -d --name chac -p 3000:3000 -v ./data:/app/data -v ./models:/app/models chac:ci
          sleep 3
          curl -sf http://localhost:3000/api/status | grep -q '"status":"ok"'
          curl -sf http://localhost:3000/api/health | grep -q '"status":"ok"'
          docker stop chac

  build:
    runs-on: ubuntu-latest
    needs: [test, e2e, docker]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
